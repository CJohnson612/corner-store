# AGD Session Ledger Schema
# Location: [project-root]/.claude/agd/agd-session.yml
#
# This is the machine-readable minor gate tree. The AGD session agent reads this
# file first at every session start to understand the current design state.
# It is committed to the project repository so design state travels with the codebase.
#
# Do not edit this file manually during an active session.
# All updates are made by the AGD session agent via the node-write and ledger operations.

version: "1.0"
project: ""                     # project name — inferred from directory or CLAUDE.md
created_at: ""                  # ISO8601 timestamp of first session
last_session_at: ""             # ISO8601 timestamp — updated on every session open

altitudes:

  - id: 50k
    label: "Vision"
    status: open                # open | in-progress | gate-passed
    gate_passed_at: null        # ISO8601 or null
    major_gate:
      items:
        - id: "50k-gate-1"
          text: "Can this vision be explained to a non-technical stakeholder without confusion?"
          status: open          # open | checked
          checked_at: null
        - id: "50k-gate-2"
          text: "Does the problem statement resonate with the people who experience the problem?"
          status: open
          checked_at: null
        - id: "50k-gate-3"
          text: "Are the success criteria observable without technical instrumentation?"
          status: open
          checked_at: null
        - id: "50k-gate-4"
          text: "Are the boundaries clear enough to prevent scope creep?"
          status: open
          checked_at: null
        - id: "50k-gate-5"
          text: "Have the key assumptions embedded in the vision been named and acknowledged?"
          status: open
          checked_at: null
        - id: "50k-gate-6"
          text: "Is the problem statement free of solution-domain language?"
          status: open
          checked_at: null
    minor_gates: []
    altitude_notes: []          # notes logged from other altitudes, targeting this one

  - id: 30k
    label: "Capabilities"
    status: open
    gate_passed_at: null
    major_gate:
      items:
        - id: "30k-gate-1"
          text: "Does every capability trace to something in the vision statement?"
          status: open
          checked_at: null
        - id: "30k-gate-2"
          text: "Are there aspects of the vision not covered by any capability?"
          status: open
          checked_at: null
        - id: "30k-gate-3"
          text: "Is every capability described in business terms, not solution terms?"
          status: open
          checked_at: null
        - id: "30k-gate-4"
          text: "Could a business stakeholder review this map and confirm it is complete and correct?"
          status: open
          checked_at: null
        - id: "30k-gate-5"
          text: "Are the boundaries between capabilities clear — does each have a single clear owner?"
          status: open
          checked_at: null
    minor_gates: []
    altitude_notes: []

  - id: 10k
    label: "Architecture"
    status: open
    gate_passed_at: null
    major_gate:
      items:
        - id: "10k-gate-1"
          text: "Does every capability from 30K map to at least one component?"
          status: open
          checked_at: null
        - id: "10k-gate-2"
          text: "Do component boundaries exhibit high cohesion and low coupling?"
          status: open
          checked_at: null
        - id: "10k-gate-3"
          text: "Are all integration points between components identified with enough detail to design contracts?"
          status: open
          checked_at: null
        - id: "10k-gate-4"
          text: "Is it clear which component owns each piece of data?"
          status: open
          checked_at: null
        - id: "10k-gate-5"
          text: "Can each component be independently deployed or replaced without coordinated changes to others?"
          status: open
          checked_at: null
        - id: "10k-gate-6"
          text: "Have the significant architectural decisions been identified for formal recording?"
          status: open
          checked_at: null
    minor_gates: []
    altitude_notes: []

  - id: 5k
    label: "Design"
    status: open
    gate_passed_at: null
    major_gate:
      items:
        - id: "5k-gate-1"
          text: "Does every component have explicitly defined preconditions, postconditions, and invariants?"
          status: open
          checked_at: null
        - id: "5k-gate-2"
          text: "Does every interface contract specify what happens when the contract is violated?"
          status: open
          checked_at: null
        - id: "5k-gate-3"
          text: "Can each component's internal implementation change without affecting other components' behavior?"
          status: open
          checked_at: null
        - id: "5k-gate-4"
          text: "Are entity invariants — business rules that must always hold — documented explicitly?"
          status: open
          checked_at: null
        - id: "5k-gate-5"
          text: "Is there a clear test strategy for each component — what will be tested and at what level?"
          status: open
          checked_at: null
        - id: "5k-gate-6"
          text: "Have implementation details been deferred to 1K rather than decided here?"
          status: open
          checked_at: null
    minor_gates: []
    altitude_notes: []

  - id: 1k
    label: "Implementation"
    status: open
    gate_passed_at: null
    major_gate:
      items:
        - id: "1k-gate-1"
          text: "Does the implementation match the component design documented at 5K, or are divergences recorded?"
          status: open
          checked_at: null
        - id: "1k-gate-2"
          text: "Are fitness functions in place for the architectural properties declared at 10K?"
          status: open
          checked_at: null
        - id: "1k-gate-3"
          text: "Is the system observable — can failures be diagnosed from runtime signals without source access?"
          status: open
          checked_at: null
        - id: "1k-gate-4"
          text: "Is the deployment process repeatable without manual steps?"
          status: open
          checked_at: null
        - id: "1k-gate-5"
          text: "Are implementation decisions not anticipated at 5K captured in the relevant artifact nodes?"
          status: open
          checked_at: null
    minor_gates: []
    altitude_notes: []

# --- Altitude Note Structure ---
# Each entry in altitudes[].altitude_notes[] follows this shape:
#
# - id: ""                      # unique id: e.g. "note-30k-001"
#   text: ""                    # the concern, constraint, or detail being logged
#   source_altitude_id: ""      # altitude where this note was created (e.g. "30k")
#   target_altitude_id: ""      # altitude this note is intended for (e.g. "10k")
#   logged_at: ""               # ISO8601
#   acknowledged: false         # true once the practitioner has reviewed it at the target altitude
#   acknowledged_at: null       # ISO8601 or null

# --- Minor Gate Node Structure ---
# Each entry in altitudes[].minor_gates[] follows this shape:
#
# - id: ""                      # unique slug: e.g. "vision/core-user-persona"
#   name: ""                    # human-readable name
#   parent_id: ""               # parent minor gate ID or major gate item ID; null for altitude roots
#   altitude_id: ""             # 50k | 30k | 10k | 5k | 1k
#   path: ""                    # relative path: e.g. ".claude/agd/vision/core-user-persona/"
#   status: open                # open | in-progress | complete | needs-review | blocked
#   created_at: ""              # ISO8601
#   updated_at: ""              # ISO8601
#   completed_at: null          # ISO8601 or null
#   cascade_flagged: false      # true when parent changed and this minor gate needs review
#   children: []                # list of child minor gate IDs (for fast traversal)
#   principles_referenced: []   # principle names from the principles library applied here
